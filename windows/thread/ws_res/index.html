<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cola · Web Server</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Prism -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-coy.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css" />
    <!-- Google Font: Sora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- 使用内联 SVG 生成一个简约的 "C" 字母图标，避免浏览器请求 favicon.ico -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23f7f5f0'/%3E%3Ctext x='50' y='68' font-family='system-ui, sans-serif' font-size='50' font-weight='bold' text-anchor='middle' fill='%238b5a2b'%3EC%3C/text%3E%3C/svg%3E" />

    <style>
        :root {
            --bg: #f7f5f0;
            --card-bg: #f7f5f0;
            --text: #2c251e;
            --text-2: #8b8680;
            --border: #e0ddd6;
            --btn-bg: #2e2a26;
            --btn-hover: #3d3832;
            --link-color: #8b5a2b;
            --tag-color: #3d3832;
            --font-body: "Sora", "PingFang SC", "Noto Sans SC", system-ui, sans-serif;
            --font-mono: "Geist Mono", "SFMono-Regular", "Menlo", monospace;
            --shadow: 0 8px 30px rgba(44, 37, 30, 0.06);
            --radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        ::selection {
            background: rgba(139, 90, 43, 0.18);
        }

        .card {
            max-width: 780px;
            width: 100%;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 2.8rem 2.8rem 2.2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            animation: cardIn 0.7s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes cardIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ── 头像 + 右侧信息 ── */
        .profile {
            display: flex;
            align-items: flex-start;
            gap: 1.8rem;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
        }

        .avatar-wrapper {
            flex-shrink: 0;
            position: relative;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
            background: #ede8e0;
            position: relative;
            z-index: 2;
        }

        /* ── 阳光溅射效果（长短不一的光线） ── */
        .avatar-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg 15deg,
                rgba(255, 200, 50, 0.3) 15deg 17deg,
                transparent 17deg 30deg,
                rgba(255, 200, 50, 0.4) 30deg 33deg,
                transparent 33deg 50deg,
                rgba(255, 200, 50, 0.15) 50deg 52deg,
                transparent 52deg 70deg,
                rgba(255, 200, 50, 0.35) 70deg 73deg,
                transparent 73deg 90deg,
                rgba(255, 200, 50, 0.25) 90deg 93deg,
                transparent 93deg 110deg,
                rgba(255, 200, 50, 0.5) 110deg 113deg,
                transparent 113deg 130deg,
                rgba(255, 200, 50, 0.2) 130deg 133deg,
                transparent 133deg 150deg,
                rgba(255, 200, 50, 0.45) 150deg 153deg,
                transparent 153deg 170deg,
                rgba(255, 200, 50, 0.15) 170deg 173deg,
                transparent 173deg 190deg,
                rgba(255, 200, 50, 0.3) 190deg 193deg,
                transparent 193deg 210deg,
                rgba(255, 200, 50, 0.4) 210deg 213deg,
                transparent 213deg 230deg,
                rgba(255, 200, 50, 0.25) 230deg 233deg,
                transparent 233deg 250deg,
                rgba(255, 200, 50, 0.35) 250deg 253deg,
                transparent 253deg 270deg,
                rgba(255, 200, 50, 0.2) 270deg 273deg,
                transparent 273deg 290deg,
                rgba(255, 200, 50, 0.5) 290deg 293deg,
                transparent 293deg 310deg,
                rgba(255, 200, 50, 0.15) 310deg 313deg,
                transparent 313deg 330deg,
                rgba(255, 200, 50, 0.3) 330deg 333deg,
                transparent 333deg 360deg
            );
            mask: radial-gradient(circle at center, transparent 30%, black 31% 60%, transparent 61%);
            -webkit-mask: radial-gradient(circle at center, transparent 30%, black 31% 60%, transparent 61%);
            transform: scale(1.4);
            animation: sunSpin 30s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes sunSpin {
            to { transform: scale(1.4) rotate(360deg); }
        }

        /* 光晕脉冲 */
        .avatar {
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 180, 50, 0.2); }
            50% { box-shadow: 0 0 20px 8px rgba(255, 180, 50, 0.15); }
        }

        .profile-info {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .typing-wrapper {
            font-size: 1.4rem;
            font-weight: 400;
            line-height: 1.6;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .typing-wrapper .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: var(--link-color);
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 0.9s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .typing-wrapper .highlight {
            color: var(--link-color);
            font-weight: 600;
        }

        /* ── 技能标签 ── */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 0.7rem;
            margin-top: 0.1rem;
        }

        .skills span {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 500;
            padding: 0.15rem 1rem;
            border-radius: 20px;
            background: rgba(61, 56, 50, 0.10);
            color: var(--tag-color);
            border: 1px solid rgba(61, 56, 50, 0.08);
            letter-spacing: 0.02em;
        }

        /* ── 链接 ── */
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem 2.4rem;
            margin-bottom: 1.8rem;
            padding: 0.6rem 0 0.8rem;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .links a {
            color: var(--text);
            text-decoration: none;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
            font-weight: 400;
        }

        .links a i {
            font-size: 1.3rem;
            width: 1.6rem;
            text-align: center;
            color: var(--link-color);
            transition: transform 0.2s;
        }

        .links a:hover {
            color: var(--link-color);
        }
        .links a:hover i {
            transform: scale(1.1);
        }

        /* ── GitHub 贡献图 ── */
        .contribution {
            text-align: center;
            margin-bottom: 1.6rem;
            background: #fcfaf7;
            border-radius: 14px;
            padding: 12px 8px 6px;
            border: 1px solid var(--border);
        }

        .contribution img {
            max-width: 100%;
            display: block;
            border-radius: 8px;
        }

        .contribution .caption {
            font-size: 0.8rem;
            color: var(--text-2);
            margin-top: 6px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        .contribution .caption i {
            margin-right: 4px;
            color: var(--link-color);
        }

        /* ── 服务器状态 ── */
        .server-info {
            background: rgba(224, 221, 214, 0.25);
            border-radius: 16px;
            padding: 1.2rem 1.8rem;
            margin: 1rem 0 1.8rem;
            border: 1px solid var(--border);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.4rem 0.8rem;
        }

        .server-info .badge {
            display: inline-block;
            background: #2e7d5e;
            color: #fff;
            font-weight: 500;
            font-size: 0.65rem;
            padding: 0.1rem 0.8rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .server-info p {
            color: var(--text);
            font-size: 0.95rem;
            font-weight: 400;
            margin: 0;
        }

        .server-info .time-display {
            color: var(--text-2);
            font-size: 0.8rem;
            font-variant-numeric: tabular-nums;
            font-family: var(--font-mono);
            min-width: 8em;
            display: inline-block;
            text-align: center;
        }

        /* ── 操作按钮 ── */
        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .actions .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--btn-bg);
            border: none;
            color: #fff;
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            font-family: var(--font-body);
            cursor: pointer;
            transition: background 0.25s ease, transform 0.2s ease;
            text-decoration: none;
        }

        .actions .btn:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
        }

        .actions .btn i {
            font-size: 1rem;
        }

        .actions .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .actions .btn-outline:hover {
            background: var(--border);
            transform: translateY(-2px);
        }

        /* ── 落款 ── */
        .footer {
            margin-top: 2.2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-2);
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        /* ── 模态框 ── */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(44, 37, 30, 0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            max-width: 820px;
            width: 100%;
            max-height: 85vh;
            border-radius: var(--radius);
            padding: 1.8rem 2rem 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .modal-header .file-name {
            font-size: 0.85rem;
            color: var(--text-2);
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .modal-header .file-name i {
            color: var(--link-color);
        }

        .modal-header .close-btn {
            background: none;
            border: none;
            color: var(--text-2);
            font-size: 1.6rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            line-height: 1;
            padding: 0 4px;
        }

        .modal-header .close-btn:hover {
            color: var(--text);
            transform: rotate(90deg);
        }

        .modal-body {
            flex: 1;
            overflow: auto;
            margin-top: 1rem;
            background: #fcfaf7;
            border-radius: 12px;
            padding: 0;
            border: 1px solid var(--border);
        }

        .modal-body pre {
            margin: 0 !important;
            padding: 1.2rem 1.4rem !important;
            font-family: var(--font-mono);
            font-size: 0.78rem;
            line-height: 1.7;
            background: transparent !important;
            border: none !important;
        }

        .modal-body pre code {
            display: block;
            font-family: inherit;
        }

        .modal-body .line-numbers .line-numbers-rows {
            border-right: 1px solid var(--border);
            padding-right: 0.8rem;
        }

        .modal-body .line-numbers-rows span {
            color: var(--text-2);
            font-weight: 300;
        }

        /* ── 响应式 ── */
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .card { padding: 1.8rem 1.2rem; border-radius: 16px; }
            .profile { flex-direction: column; align-items: center; text-align: center; gap: 0.6rem; }
            .avatar-wrapper { width: 72px; height: 72px; }
            .typing-wrapper { font-size: 1.15rem; }
            .profile-info { align-items: center; }
            .skills { justify-content: center; }
            .links { justify-content: center; gap: 0.6rem 1.2rem; }
            .links a { font-size: 0.9rem; }
            .skills span { font-size: 0.65rem; padding: 0.1rem 0.7rem; }
            .actions .btn { width: 100%; justify-content: center; font-size: 0.85rem; }
            .modal-content { padding: 1.2rem; margin: 0.5rem; }
            .modal-body pre { padding: 0.8rem 1rem !important; font-size: 0.7rem; }
            .server-info { flex-direction: column; }
            .server-info .time-display { min-width: 6em; }
        }

        @media (max-width: 400px) {
            .card { padding: 1.2rem 0.8rem; }
            .typing-wrapper { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- 头像 + 右侧信息 -->
        <div class="profile">
            <div class="avatar-wrapper">
                <img class="avatar" src="avatar.jpg" alt="avatar" />
            </div>
            <div class="profile-info">
                <div class="typing-wrapper">
                    <span id="typedText"></span><span class="cursor" id="cursor"></span>
                </div>
                <div class="skills">
                    <span>C/C++</span>
                    <span>Qt</span>
                    <span>MultiThreading</span>
                    <span>OpenGL</span>
                    <span>SDL</span>
                    <span>TCP/IP</span>
                </div>
            </div>
        </div>

        <!-- 链接 -->
        <div class="links">
            <a href="https://saiumr.github.io/" target="_blank">
                <i class="fas fa-blog"></i> 博客主页
            </a>
            <a href="https://github.com/saiumr" target="_blank">
                <i class="fab fa-github"></i> GitHub 主页
            </a>
        </div>

        <!-- GitHub 贡献图（用户名改为 cola） -->
        <div class="contribution">
            <img src="https://ghchart.rshah.org/saiumr" alt="GitHub 贡献图" />
            <div class="caption"><i class="fab fa-github"></i> cola · 2026</div>
        </div>

        <!-- 服务器状态 -->
        <div class="server-info">
            <span class="badge">● 在线</span>
            <p>当你看到此页面时，表示 web server 运行正常</p>
            <span class="time-display" id="serverTime">加载中...</span>
        </div>

        <!-- 操作按钮 -->
        <div class="actions">
            <button class="btn" id="viewSourceBtn"><i class="fas fa-code"></i> 查看源码</button>
            <a class="btn btn-outline" href="tcp_ip.html" target="_blank"><i class="fas fa-file-alt"></i> 如果你也想写一个 Web Server</a>
        </div>

        <!-- 落款 -->
        <div class="footer">:D server by cola - 2026</div>

    </div>

    <!-- 模态框 -->
    <div class="modal" id="sourceModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="file-name"><i class="fas fa-file-code"></i> web_server.c</span>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <pre class="line-numbers" data-start="1"><code class="language-c" id="sourceContent">加载中...</code></pre>
            </div>
        </div>
    </div>

    <!-- Prism -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>

    <script>
        (function() {
            // 打字效果
            const text = "Hi, I'm cola! A <span class='highlight'>热爱技术</span>，<span class='highlight'>崇尚自由</span> の programmer!";
            const typedSpan = document.getElementById('typedText');
            let charIndex = 0;
            let isTag = false;
            let tagBuffer = '';

            function typeWriter() {
                if (charIndex < text.length) {
                    const char = text[charIndex];
                    if (char === '<') {
                        isTag = true;
                        tagBuffer = '<';
                    } else if (char === '>') {
                        isTag = false;
                        tagBuffer += '>';
                        typedSpan.innerHTML += tagBuffer;
                        tagBuffer = '';
                    } else if (isTag) {
                        tagBuffer += char;
                    } else {
                        typedSpan.innerHTML += char;
                    }
                    charIndex++;
                    setTimeout(typeWriter, 40 + Math.random() * 30);
                }
            }
            setTimeout(typeWriter, 400);

            // 时钟 - 固定宽度避免跳动
            function updateTime() {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                const str = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
                document.getElementById('serverTime').textContent = '⏱ ' + str;
            }
            updateTime();
            setInterval(updateTime, 1000);

            // 源码模态框
            const modal = document.getElementById('sourceModal');
            const sourceContent = document.getElementById('sourceContent');
            const viewBtn = document.getElementById('viewSourceBtn');
            const closeBtn = document.getElementById('closeModalBtn');
            let loaded = false;

            viewBtn.addEventListener('click', function() {
                if (loaded) {
                    modal.classList.add('active');
                    return;
                }
                sourceContent.textContent = '加载中...';
                modal.classList.add('active');

                fetch('web_server.c')
                    .then(res => {
                        if (!res.ok) throw new Error('文件不存在或无法读取');
                        return res.text();
                    })
                    .then(data => {
                        sourceContent.textContent = data;
                        Prism.highlightElement(sourceContent);
                        loaded = true;
                    })
                    .catch(err => {
                        sourceContent.textContent = '❌ 无法加载 web_server.c\n' + err.message;
                    });
            });

            function closeModal() {
                modal.classList.remove('active');
            }

            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', function(e) {
                if (e.target === modal) closeModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeModal();
            });
        })();
    </script>

</body>
</html>
